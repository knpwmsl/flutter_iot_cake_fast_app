name: flutter_iot_cake_fast_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  font_awesome_flutter: ^10.12.0
  url_launcher: ^6.3.2
  
  # --- ส่วนที่ใช้แสดงแผนที่ (ในหน้า CakeShopDetailUi) ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # --- ส่วนที่ใช้ในหน้า CakeShopListUi (ห้ามลบ/ห้ามคอมเมนต์ เพราะหน้า List เรียกใช้อยู่) ---
  carousel_slider: ^5.1.2
  dots_indicator: ^4.0.1
  
  # --- ส่วนเสริมอื่นๆ (เปิดไว้เผื่อขยายโปรเจกต์ในอนาคต) ---
  map_launcher: ^4.4.3
  google_maps_flutter: ^2.14.2 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.0.3


flutter:

  uses-material-design: true

  assets:
    - assets/images/

# การตั้งค่า Icon ของแอป
icons_launcher:
  image_path: "assets/icon/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true